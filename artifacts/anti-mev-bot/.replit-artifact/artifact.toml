kind = "web"
previewPath = "/"
title = "Anti-MEV Volume Bot"
version = "1.0.0"
id = "artifacts/anti-mev-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20960

[services.development]
run = "pnpm --filter @workspace/anti-mev-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anti-mev-bot", "run", "build" ]
publicDir = "artifacts/anti-mev-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20960"
BASE_PATH = "/"
